services:
  - type: web
    name: hr-analytics-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python run_pipeline.py
    startCommand: gunicorn src.backend.app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: CORS_ORIGINS
        value: "*"
      - key: FLASK_DEBUG
        value: "false"
