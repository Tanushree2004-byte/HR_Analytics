<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics | HR Intelligence Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/dark-mode.css">
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <div class="metrics-grid" id="modelComparison"></div>
        <div class="charts-grid">
          <div class="chart-card"><div class="chart-header"><h3 class="chart-title">Gender</h3></div><div class="chart-container sm"><canvas id="aGender"></canvas></div></div>
          <div class="chart-card"><div class="chart-header"><h3 class="chart-title">Departments</h3></div><div class="chart-container sm"><canvas id="aDept"></canvas></div></div>
          <div class="chart-card"><div class="chart-header"><h3 class="chart-title">Dept Attrition</h3></div><div class="chart-container"><canvas id="aDeptAttr"></canvas></div></div>
          <div class="chart-card"><div class="chart-header"><h3 class="chart-title">Distance From Home</h3></div><div class="chart-container"><canvas id="aDistance"></canvas></div></div>
          <div class="chart-card"><div class="chart-header"><h3 class="chart-title">Marital Status</h3></div><div class="chart-container sm"><canvas id="aMarital"></canvas></div></div>
          <div class="chart-card"><div class="chart-header"><h3 class="chart-title">Education vs Attrition</h3></div><div class="chart-container"><canvas id="aEduAttr"></canvas></div></div>
        </div>
        <div class="insights-panel"><h3 style="margin-bottom:16px">All Business Insights</h3><div id="allInsights"></div></div>
        <footer class="footer"><p>© 2026 HR Intelligence Platform</p></footer>
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
  <script src="js/analytics.js"></script>
  <script>document.addEventListener('DOMContentLoaded',()=>{App.initApp('Analytics','Deep workforce analytics and insights');initAnalytics();});</script>
</body>
</html>
