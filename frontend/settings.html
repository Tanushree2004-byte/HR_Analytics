<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | HR Intelligence Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/dark-mode.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <div class="settings-section">
          <h3>Appearance</h3>
          <div class="toggle-switch">
            <span>Dark Mode</span>
            <div class="switch" id="darkModeSwitch"></div>
          </div>
          <div class="toggle-switch">
            <span>Animated Counters</span>
            <div class="switch active" id="animSwitch"></div>
          </div>
        </div>
        <div class="settings-section">
          <h3>API Configuration</h3>
          <div class="form-group" style="max-width:500px">
            <label>Backend API URL</label>
            <input type="text" id="apiUrl" placeholder="http://localhost:5000/api">
          </div>
          <button class="btn btn-primary" style="margin-top:12px" id="saveApiBtn">Save Configuration</button>
        </div>
        <div class="settings-section">
          <h3>About</h3>
          <p style="color:var(--text-muted);line-height:1.8">
            HR Intelligence Platform v1.0<br>
            Employee Attrition Prediction & Workforce Analytics<br>
            Built with Flask, Scikit-learn, Chart.js<br>
            Author: <a href="https://github.com/Tanushree2004-byte" target="_blank">Tanushree</a>
          </p>
        </div>
        <footer class="footer"><p>© 2026 HR Intelligence Platform</p></footer>
      </main>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      App.initApp('Settings', 'Application preferences');
      document.getElementById('apiUrl').value = localStorage.getItem('hr-api-url') || window.HR_API_BASE;
      document.getElementById('darkModeSwitch').classList.toggle('active', document.body.classList.contains('dark-mode'));
      document.getElementById('darkModeSwitch').addEventListener('click', function() {
        this.classList.toggle('active');
        document.getElementById('themeToggle')?.click();
      });
      document.getElementById('saveApiBtn').addEventListener('click', () => {
        const url = document.getElementById('apiUrl').value;
        localStorage.setItem('hr-api-url', url);
        window.HR_API_BASE = url;
        App.showToast('API URL saved', 'success');
      });
    });
  </script>
</body>
</html>
