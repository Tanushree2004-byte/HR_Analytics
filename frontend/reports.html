<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports | HR Intelligence Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/dark-mode.css">
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <div class="reports-grid">
          <div class="report-card">
            <div class="report-icon">📄</div>
            <h3>PDF Report</h3>
            <p style="color:var(--text-muted);margin:12px 0">KPIs, insights, and model metrics</p>
            <button class="btn btn-primary" onclick="downloadReport('pdf')">Download PDF</button>
          </div>
          <div class="report-card">
            <div class="report-icon">📊</div>
            <h3>CSV Export</h3>
            <p style="color:var(--text-muted);margin:12px 0">Full employee dataset export</p>
            <button class="btn btn-primary" onclick="downloadReport('csv')">Download CSV</button>
          </div>
          <div class="report-card">
            <div class="report-icon">📗</div>
            <h3>Excel Report</h3>
            <p style="color:var(--text-muted);margin:12px 0">Employees + KPIs workbook</p>
            <button class="btn btn-primary" onclick="downloadReport('excel')">Download Excel</button>
          </div>
        </div>

        <div class="settings-section" style="margin-top:28px">
          <h3>Data Management</h3>
          <div class="toggle-switch">
            <span>Upload New Dataset (CSV)</span>
            <input type="file" id="uploadInput" accept=".csv" style="display:none">
            <button class="btn btn-outline" onclick="document.getElementById('uploadInput').click()">Upload CSV</button>
          </div>
          <div class="toggle-switch">
            <span>Retrain ML Model</span>
            <button class="btn btn-secondary" id="retrainBtn">Retrain Model</button>
          </div>
        </div>

        <div class="table-card" style="margin-top:28px">
          <h3 style="margin-bottom:16px">Model Performance Metrics</h3>
          <div id="modelMetrics"></div>
        </div>
        <footer class="footer"><p>© 2026 HR Intelligence Platform</p></footer>
      </main>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/reports.js"></script>
</body>
</html>
